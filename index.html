<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>海中図書館 自習室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020c14}
body{font-family:-apple-system,'Helvetica Neue',sans-serif}
#bg{position:fixed;inset:0;background-image:url('https://i.imgur.com/fszIOqw.png');background-size:cover;background-position:center center;filter:brightness(0.78) saturate(1.1);z-index:0}
#grade{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,12,22,0.32) 0%,rgba(0,5,15,0.08) 45%,rgba(0,5,15,0.58) 100%)}
#vig{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse 92% 82% at 50% 44%,transparent 25%,rgba(0,4,14,0.62) 100%)}
#entry{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.4s ease}
#entry.fade{opacity:0;pointer-events:none}
.entry-label{font-size:12px;letter-spacing:.32em;color:rgba(160,225,230,0.78);margin-bottom:38px;font-weight:300}
#door-scene{position:relative;width:128px;height:208px;cursor:pointer;margin-bottom:26px;perspective:700px}
#door-frame{position:absolute;inset:0;border:2.5px solid rgba(80,55,30,0.85);border-radius:6px 6px 0 0;background:rgba(10,22,28,0.25)}
#door-l,#door-r{position:absolute;top:0;bottom:0;width:50%;background:linear-gradient(140deg,#3a2210 0%,#281608 40%,#1c0e05 100%);transition:transform .95s cubic-bezier(.3,0,.15,1);border:1px solid rgba(100,65,30,0.55)}
#door-l{left:0;border-radius:3px 0 0 0;transform-origin:left center}
#door-r{right:0;border-radius:0 3px 0 0;transform-origin:right center}
#door-l.open{transform:perspective(700px) rotateY(-82deg)}
#door-r.open{transform:perspective(700px) rotateY(82deg)}
#door-l::after{content:'';position:absolute;top:16px;inset-x:8px;height:52px;border:1px solid rgba(140,90,40,0.32);border-radius:2px}
#door-r::before{content:'';position:absolute;top:16px;inset-x:8px;height:52px;border:1px solid rgba(140,90,40,0.32);border-radius:2px}
#door-r::after{content:'';position:absolute;left:7px;top:50%;width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f5e080,#c09020);transform:translateY(-50%)}
#door-glow{position:absolute;inset:3px;border-radius:3px;background:transparent;pointer-events:none;transition:background 1.1s ease}
#door-glow.lit{background:radial-gradient(ellipse at 50% 60%,rgba(0,200,220,0.3) 0%,rgba(0,140,180,0.1) 55%,transparent 80%)}
#enter-hint{font-size:12px;color:rgba(140,210,220,0.65);letter-spacing:.12em;transition:opacity .5s}
#enter-btn{display:none;margin-top:16px;padding:10px 32px;background:rgba(0,130,140,0.72);color:#c8f5f8;border:1px solid rgba(0,200,210,0.45);border-radius:24px;font-size:13px;letter-spacing:.1em;cursor:pointer;transition:background .2s}
#enter-btn:hover{background:rgba(0,100,115,.92)}
#ui{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;opacity:0;transition:opacity 1s ease}
#topbar{padding:20px 32px 0;display:flex;align-items:center;justify-content:space-between}
.badge{display:flex;align-items:center;gap:9px}
#dot{width:8px;height:8px;border-radius:50%;background:#2de0b0;box-shadow:0 0 8px rgba(45,224,176,.7);transition:all .4s}
#dot.brk{background:#f5a623;box-shadow:0 0 8px rgba(245,166,35,.7)}
#dotlbl{font-size:11px;color:rgba(160,230,225,.85);letter-spacing:.16em;font-weight:300}
#exitbtn{font-size:11px;color:rgba(150,220,215,.6);background:rgba(0,20,30,.45);border:.5px solid rgba(80,200,200,.25);border-radius:14px;padding:5px 16px;cursor:pointer;letter-spacing:.07em;transition:all .2s}
#exitbtn:hover{color:rgba(180,240,235,.95);border-color:rgba(120,220,215,.5)}
#center{flex:1;display:flex;align-items:center;justify-content:space-between;padding:0 10% 40px}
#timer-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
#ring-outer{position:relative;width:220px;height:220px}
#ring-svg{width:220px;height:220px;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(0,150,165,.18);stroke-width:10}
#ring-prog{fill:none;stroke:rgba(0,218,208,.78);stroke-width:10;stroke-linecap:round;stroke-dasharray:628.3;stroke-dashoffset:0;transition:stroke-dashoffset .85s ease,stroke .4s;filter:drop-shadow(0 0 7px rgba(0,218,208,.55))}
#ring-prog.brk{stroke:rgba(245,166,35,.82);filter:drop-shadow(0 0 7px rgba(245,166,35,.5))}
#ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
#timedisp{font-size:44px;font-weight:300;color:#cef5f0;letter-spacing:.04em;font-variant-numeric:tabular-nums;line-height:1}
#phaselbl{font-size:10px;color:rgba(100,215,210,.58);letter-spacing:.22em;font-weight:300}
#mode-row{display:flex;gap:8px}
.mtab{padding:5px 16px;font-size:11px;letter-spacing:.08em;border-radius:14px;border:.5px solid rgba(0,190,200,.2);color:rgba(120,210,210,.6);background:transparent;cursor:pointer;transition:all .2s}
.mtab.on{background:rgba(0,155,160,.35);color:#90e8e8;border-color:rgba(0,200,205,.45)}
#preset-row{display:flex;gap:8px}
.pb{padding:4px 13px;font-size:11px;border-radius:12px;border:.5px solid rgba(0,190,200,.18);color:rgba(110,200,195,.6);background:transparent;cursor:pointer;transition:all .2s}
.pb:hover{background:rgba(0,110,120,.3)}
.pb.sel{background:rgba(0,140,145,.38);color:#80e5e0;border-color:rgba(0,195,195,.45)}
#ctrlrow{display:flex;gap:10px}
.cb{padding:9px 26px;font-size:13px;letter-spacing:.07em;border-radius:22px;cursor:pointer;border:none;transition:all .2s}
#playbtn{background:rgba(0,155,150,.78);color:#c5f5f2;border:.5px solid rgba(0,215,205,.4)}
#playbtn:hover{background:rgba(0,120,118,.92)}
#savebtn{background:rgba(0,80,100,.55);color:rgba(160,230,225,.85);border:.5px solid rgba(0,180,190,.3)}#savebtn:hover{background:rgba(0,100,120,.75)}#rstbtn{background:rgba(255,255,255,.05);color:rgba(140,210,210,.65);border:.5px solid rgba(0,190,200,.18)}
#rstbtn:hover{background:rgba(255,255,255,.1)}
#rec-panel{background:rgba(0,18,28,.62);border:.5px solid rgba(0,180,190,.2);border-radius:18px;padding:20px 22px;min-width:205px;max-width:220px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);max-height:300px;overflow-y:auto}
#rec-panel::-webkit-scrollbar{width:3px}
#rec-panel::-webkit-scrollbar-thumb{background:rgba(0,180,185,.3);border-radius:2px}
#rechd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.reclbl{font-size:11px;color:rgba(120,210,210,.8);letter-spacing:.15em}
.rectot{font-size:11px;color:rgba(90,180,180,.55)}
.ri{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid rgba(0,160,165,.1)}
.ri-d{font-size:11px;color:rgba(110,190,190,.55)}
.ri-m{font-size:12px;color:#80e0dc;font-weight:500}
#recempty{font-size:11px;color:rgba(90,170,170,.4);text-align:center;padding:16px 0}


</style>
</head>
<body>
<div id="bg"></div>
<div id="grade"></div>
<div id="vig"></div>
<div id="entry">
  <div class="entry-label">海中図書館　自習室</div>
  <div id="door-scene" onclick="clickDoor()">
    <div id="door-frame">
      <div id="door-l"></div><div id="door-r"></div><div id="door-glow"></div>
    </div>
  </div>
  <div id="enter-hint">ドアをクリックして入室</div>
  
</div>
<div id="ui">
  <div id="topbar">
    <div class="badge"><div id="dot"></div><span id="dotlbl">自習室　入室中</span></div>
    <button id="exitbtn" onclick="exitRoom()">退室する</button>
  </div>
  <div id="center">
    <div id="timer-wrap">
      <div id="mode-row">
        <button class="mtab on" onclick="setMode('pomodoro',this)">ポモドーロ</button>
        <button class="mtab" onclick="setMode('stopwatch',this)">ストップウォッチ</button>
      </div>
      <div id="ring-outer">
        <svg id="ring-svg" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="100"/>
          <circle id="ring-prog" cx="110" cy="110" r="100"/>
        </svg>
        <div id="ring-center">
          <div id="timedisp">25:00</div>
          <div id="phaselbl">集中タイム</div>
        </div>
      </div>
      <div id="preset-row">
        <button class="pb" onclick="setMins(5,this)">5分</button>
        <button class="pb" onclick="setMins(10,this)">10分</button>
        <button class="pb sel" onclick="setMins(25,this)">25分</button>
        <button class="pb" onclick="setMins(45,this)">45分</button>
        <button class="pb" onclick="setMins(60,this)">60分</button>
        <button class="pb" onclick="setMins(90,this)">90分</button>
      </div>
      <div id="ctrlrow">
        <button class="cb" id="playbtn" onclick="togglePlay()">開始</button>
        <button class="cb" id="savebtn" onclick="saveLap()" title="今までの時間を記録して続ける">記録する</button>
        <button class="cb" id="rstbtn" onclick="resetTimer()">リセット</button>
      </div>
    </div>
    <div id="rec-panel">
      <div id="rechd">
        <span class="reclbl">学習記録</span>
        <span class="rectot" id="rectot">合計 0分</span>
      </div>
      <div id="reclist"><div id="recempty">記録なし</div></div>
    </div>
  </div>
</div>
<script>
const CIRC=2*Math.PI*100;
let records=[];try{records=JSON.parse(localStorage.getItem('aql2')||'[]')}catch(e){}
const st={mode:'pomodoro',running:false,phase:'focus',mins:25,rem:1500,total:1500,elapsed:0,iv:null};
let inRoom=false,doorOpen=false;
function clickDoor(){
  if(doorOpen)return;doorOpen=true;
  document.getElementById('door-l').classList.add('open');
  document.getElementById('door-r').classList.add('open');
  document.getElementById('door-glow').classList.add('lit');
  document.getElementById('enter-hint').style.opacity='0';
  setTimeout(()=>enterRoom(), 950);
}
function enterRoom(){
  const e=document.getElementById('entry');
  e.classList.add('fade');
  setTimeout(()=>{
    e.style.display='none';
    const u=document.getElementById('ui');
    u.style.display='flex';u.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>u.style.opacity='1'));
    inRoom=true;
  },1400);
}
function exitRoom(){
  if(st.running)pauseTimer(true);inRoom=false;
  const u=document.getElementById('ui');u.style.opacity='0';
  setTimeout(()=>{
    u.style.display='none';
    const e=document.getElementById('entry');e.style.display='flex';e.classList.remove('fade');
    doorOpen=false;
    ['door-l','door-r','door-glow'].forEach(id=>document.getElementById(id).classList.remove('open','lit'));
    document.getElementById('enter-hint').style.opacity='1';
    document.getElementById('enter-btn').style.display='none';
    resetTimer();
  },700);
}
function updateRing(){
  const prog=document.getElementById('ring-prog');
  const ratio=st.mode==='pomodoro'?Math.max(0,st.rem/st.total):Math.min(1,st.elapsed/(st.mins*60));
  prog.style.strokeDashoffset=CIRC*(st.mode==='pomodoro'?1-ratio:1-ratio);
  if(st.phase==='break'){prog.classList.add('brk');document.getElementById('dot').classList.add('brk')}
  else{prog.classList.remove('brk');document.getElementById('dot').classList.remove('brk')}
}
function setMode(m,btn){
  if(st.running)return;st.mode=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('preset-row').style.display=m==='pomodoro'?'flex':'none';
  document.getElementById('phaselbl').style.display=m==='pomodoro'?'block':'none';
  resetTimer();
}
function setMins(m,btn){
  if(st.running)return;st.mins=m;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  resetTimer();
}
function togglePlay(){if(!inRoom)return;st.running?pauseTimer(false):startTimer()}
function startTimer(){st.running=true;document.getElementById('playbtn').textContent='一時停止';st.iv=setInterval(tick,1000)}
function pauseTimer(save){
  st.running=false;clearInterval(st.iv);document.getElementById('playbtn').textContent='再開';
  if(save&&st.elapsed>60)saveRecord();
}
function saveLap(){
  if(st.elapsed<60){alert('記録するには1分以上必要です');return;}
  saveRecord();
  // elapsed をリセットして続きから計測
  st.elapsed=0;
  flashSaved();
}
function flashSaved(){
  const btn=document.getElementById('savebtn');
  const orig=btn.textContent;
  btn.textContent='✓ 記録しました';
  btn.style.background='rgba(0,160,140,.7)';
  setTimeout(()=>{btn.textContent=orig;btn.style.background='';},1800);
}
function resetTimer(){
  st.running=false;clearInterval(st.iv);document.getElementById('playbtn').textContent='開始';
  st.phase='focus';st.elapsed=0;st.rem=st.mode==='pomodoro'?st.mins*60:0;st.total=st.rem;
  document.getElementById('phaselbl').textContent='集中タイム';
  document.getElementById('ring-prog').style.strokeDashoffset='0';
  document.getElementById('ring-prog').classList.remove('brk');
  document.getElementById('dot').classList.remove('brk');
  updateDisplay(st.rem);updateRing();
}
function tick(){
  if(st.mode==='pomodoro'){
    st.rem--;st.elapsed++;updateDisplay(st.rem);updateRing();
    if(st.rem<=0){
      if(st.phase==='focus'){saveRecord();st.phase='break';st.rem=Math.max(5,Math.round(st.mins/5))*60;st.total=st.rem;st.elapsed=0;document.getElementById('phaselbl').textContent='休憩タイム';}
      else{st.phase='focus';st.rem=st.mins*60;st.total=st.rem;st.elapsed=0;document.getElementById('phaselbl').textContent='集中タイム';}
      updateRing();
    }
  }else{st.elapsed++;updateDisplay(st.elapsed);updateRing()}
}
function updateDisplay(s){const m=Math.floor(Math.abs(s)/60),sc=Math.abs(s)%60;document.getElementById('timedisp').textContent=String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0')}
function saveRecord(){
  const mins=Math.round(st.elapsed/60);if(mins<1)return;
  const n=new Date();
  records.unshift({d:`${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`,m:mins});
  if(records.length>30)records.pop();
  try{localStorage.setItem('aql2',JSON.stringify(records))}catch(e){}
  renderRecords();
}
function renderRecords(){
  const list=document.getElementById('reclist');
  if(!records.length){list.innerHTML='<div style="font-size:11px;color:rgba(90,170,170,.4);text-align:center;padding:16px 0">記録なし</div>';document.getElementById('rectot').textContent='合計 0分';return}
  const tot=records.reduce((a,r)=>a+r.m,0),th=Math.floor(tot/60),tm=tot%60;
  document.getElementById('rectot').textContent=th>0?`合計 ${th}h${tm}m`:`合計 ${tot}分`;
  list.innerHTML=records.slice(0,15).map(r=>`<div class="ri"><span class="ri-d">${r.d}</span><span class="ri-m">${r.m}分</span></div>`).join('');
}
document.getElementById('ring-prog').style.strokeDasharray=CIRC;
document.getElementById('ring-prog').style.strokeDashoffset='0';
renderRecords();updateDisplay(st.rem);



</script>

  <svg id="cat-svg" width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
    </body>
</html>
